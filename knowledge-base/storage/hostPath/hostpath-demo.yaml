apiVersion: v1
kind: Pod
metadata:
  name: hostpath-writer
  labels:
    app: hostpath-demo
spec:
  containers:
    - name: writer
      image: busybox
      command:
        - sh
        - -c
        - |
          while true; do
            echo "$(date) - pod: $HOSTNAME" >> /data/log.txt
            sleep 5
          done
      volumeMounts:
        - name: host-storage
          mountPath: /data

  volumes:
    - name: host-storage
      hostPath:
        path: /mnt/storage       # mapped from host via kind extraMounts
        type: DirectoryOrCreate  # create the directory if it does not exist

  # Pin the pod to a worker node (control-plane has no extraMount)
  nodeSelector:
    kubernetes.io/role: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
---
# Second pod — proves data written by the first pod survives across pods
apiVersion: v1
kind: Pod
metadata:
  name: hostpath-reader
  labels:
    app: hostpath-demo
spec:
  containers:
    - name: reader
      image: busybox
      command:
        - sh
        - -c
        - |
          until [ -f /data/log.txt ]; do sleep 1; done
          echo "=== persisted data ==="
          cat /data/log.txt
          tail -f /data/log.txt
      volumeMounts:
        - name: host-storage
          mountPath: /data

  volumes:
    - name: host-storage
      hostPath:
        path: /mnt/storage
        type: DirectoryOrCreate
